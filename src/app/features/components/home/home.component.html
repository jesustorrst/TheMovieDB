@let movie = selectedMovie();

<main
  class="sh-home"
  style="--backdrop-url: url(https://image.tmdb.org/t/p/w500/{{
    movie?.backdrop_path
  }})"
>
  <section class="sh-home__content">
    <span>{{ movie?.release_date | date: 'yyyy' }}</span>
    <h1>
      {{ movie?.title }} ({{ movie?.original_title }})
    </h1>
    <p>{{ movie?.overview }}</p>
    <div class="sh-home__button">
      <app-button text="Ver trailer" />
    </div>
  </section>
  <picture class="sh-home__poster">
    <img
      [src]="movie?.poster_path | movieDbThumb"
      alt="poster de la película {{ movie?.title }}"
    />
  </picture>
</main>

<section>
  <app-home-reservation />
</section>

<section class="sh-home__movies">
  <app-home-movies-list />
</section>
